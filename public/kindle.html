<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Agent Buddy Kindle</title>
    <link rel="stylesheet" href="/kindle.css?v=20260717-notion-details" />
  </head>
  <body>
    <div class="kindle-page">
      <div class="topbar clearfix">
        <div class="brand">
          <div class="title">Agent Buddy</div>
          <div class="subtitle" id="project-path">Loading...</div>
        </div>
        <div class="top-status">
          <div id="clock">--:--</div>
          <div class="status" id="status">LOADING</div>
        </div>
      </div>

      <table class="tabs" role="navigation" aria-label="Agent selector">
        <tr>
          <td><button class="agent-tab active" data-agent="codex">Codex</button></td>
          <td><button class="agent-tab" data-agent="notion">Notion</button></td>
          <td><button class="agent-tab" data-agent="hermes">Hermes</button></td>
        </tr>
      </table>

      <div class="section project-section">
        <div class="label" id="project-label">PROJECT</div>
        <div class="project-name" id="project-name">Unavailable</div>
        <div class="muted" id="project-branch">branch: --</div>
      </div>

      <table class="metrics">
        <tr>
          <td>
            <div class="label" id="model-label">MODEL</div>
            <div class="metric-value" id="model-name">Unavailable</div>
            <div class="muted" id="provider-name">provider</div>
          </td>
          <td>
            <div class="label" id="context-label">CONTEXT</div>
            <div class="metric-value mono" id="context-text">0 / 200K</div>
            <div class="bar"><span id="context-bar"></span></div>
          </td>
        </tr>
        <tr>
          <td>
            <div class="label" id="requests-label">REQ</div>
            <div class="metric-number" id="requests">0</div>
          </td>
          <td>
            <div class="label" id="tokens-label">TOKENS</div>
            <div class="metric-number" id="tokens">0</div>
          </td>
        </tr>
      </table>

      <div class="section">
        <div class="label">SESSIONS</div>
        <div class="session-list" id="sessions"></div>
      </div>

      <div class="section latest-section">
        <div class="label" id="latest-reply-label">LATEST REPLY</div>
        <div class="reply" id="latest-reply">Loading...</div>
      </div>

      <div class="section activity-section">
        <div class="label">ACTIVITY</div>
        <div class="activity-list" id="activity"></div>
      </div>

      <div class="footer" id="sources">sources loading | refresh 15s</div>
    </div>
    <script src="/kindle.js?v=20260717-notion-details"></script>
  </body>
</html>
